<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Input Field Component</title>
<style>
  :root {
    --color-text: #1a1a1a;
    --color-border: #767676;
    --color-border-hover: #404040;
    --color-focus: #2563eb;
    --color-helper: #595959;
    --color-bg: #ffffff;
    --radius: 6px;
  }

  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    color: var(--color-text);
    background: var(--color-bg);
    padding: 2rem;
    max-width: 360px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 0.375rem;
  }

  .field__label {
    font-size: 0.875rem;
    font-weight: 600;
  }

  .field__input {
    font-size: 1rem;
    padding: 0.5rem 0.75rem;
    border: 2px solid var(--color-border);
    border-radius: var(--radius);
    background: var(--color-bg);
    color: var(--color-text);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  /* Hover state */
  .field__input:hover:not(:disabled):not(:focus) {
    border-color: var(--color-border-hover);
  }

  /* Focus state */
  .field__input:focus {
    outline: none;
    border-color: var(--color-focus);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25);
  }

  /* Visible focus for keyboard nav even on browsers without :focus-visible support fallback */
  .field__input:focus-visible {
    outline: none;
    border-color: var(--color-focus);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25);
  }

  .field__helper {
    font-size: 0.8125rem;
    color: var(--color-helper);
  }

  /* Error state */
  .field__input[aria-invalid="true"] {
    border-color: #d92d20;
  }

  .field__input[aria-invalid="true"]:focus {
    box-shadow: 0 0 0 3px rgba(217, 45, 32, 0.2);
  }

  .field__helper--error {
    color: #d92d20;
  }
</style>
</head>
<body>

  <div class="field">
    <label class="field__label" for="email">Email address</label>
    <span class="field__helper" id="email-helper">
      We'll only use this to send you a receipt.
    </span>
    <input
      class="field__input"
      type="email"
      id="email"
      name="email"
      autocomplete="email"
      aria-describedby="email-helper"
      aria-invalid="false"
    />
  </div>

</body>
</html>
